name: medito
description: A meditation learning tool

# Build and deploy/upload commands:
# Check version, then build & deploy/upload both platforms:
# ./build_and_deploy_all.sh
#
# Build and upload iOS only:
# ./build_and_upload_ios.sh
#
# Build and deploy Android only:
# ./build_and_deploy_android.sh
#
# Just build Android APK (used by the script above):
# ./build_apk.sh

version: 3.5.0+30133

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audio_session: ^0.1.21
  audio_service: ^0.18.15
  app_tracking_transparency: ^2.0.4
  cached_network_image: ^3.4.1
  device_info_plus: ^11.3.3
  email_validator: ^3.0.0
  equatable: ^2.0.5
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.0.0
  flutter_local_notifications: ^19.0.0
  flutter_markdown: ^0.7.4+1
  flutter_riverpod: ^2.4.9
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.9
  freezed_annotation: ^2.4.4
  haptic_feedback: ^0.5.1+1
  health: ^12.1.0
  http: ^1.3.0
  image: ^4.1.4
  in_app_review: ^2.0.10
  intl: ^0.20.2
  just_audio: ^0.9.41
  package_info_plus: ^8.0.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  reorderables: ^0.6.0
  riverpod_annotation: ^2.3.3
  rxdart: ^0.28.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  timezone: ^0.10.0
  url_launcher: ^6.3.1
  uuid: ^4.5.0
  hugeicons:
    hosted: https://onepub.dev/api/kdpxxpsdav
    version: ^0.0.1
  flutter_staggered_grid_view: ^0.7.0
  share_plus: ^10.1.3
  app_links: ^6.4.0
  do_not_disturb: ^1.0.3
  font_awesome_flutter: ^10.1.0
  xml: ^6.5.0
  xml2json: ^6.2.7
  crypto: ^3.0.6
  home_widget: ^0.7.0
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main
  firebase_crashlytics: ^4.3.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^25.2.0
  mocktail: ^1.0.2
  build_runner: ^2.5.1
  riverpod_generator: ^2.3.9
  json_serializable: ^6.9.0
  freezed: ^2.5.2
  mockito: ^5.4.6
  analyzer: ^7.3.0
  json_annotation: ^4.9.0
  device_preview: ^1.1.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Source Serif
      fonts:
        - asset: assets/fonts/source-serif/SourceSerif4-Regular.ttf
        - asset: assets/fonts/source-serif/SourceSerif4-Medium.ttf
        - asset: assets/fonts/source-serif/SourceSerif4-SemiBold.ttf
        - asset: assets/fonts/source-serif/SourceSerif4-Bold.ttf
    - family: DM Mono
      fonts:
        - asset: assets/fonts/dm-mono/DMMono-Medium.ttf
        - asset: assets/fonts/dm-mono/DMMono-Regular.ttf
    - family: DM Sans
      fonts:
        - asset: assets/fonts/dm-sans/DMSans-Bold.ttf
        - asset: assets/fonts/dm-sans/DMSans-Medium.ttf
        - asset: assets/fonts/dm-sans/DMSans-Regular.ttf
        - asset: assets/fonts/dm-sans/DMSans-SemiBold.ttf
    - family: DM Serif Display
      fonts:
        - asset: assets/fonts/dm-serif/DMSerifDisplay-Regular.ttf
        - asset: assets/fonts/dm-serif/DMSerifDisplay-Italic.ttf
    - family: Teachers
      fonts:
        - asset: assets/fonts/teachers/Teachers-Regular.ttf
        - asset: assets/fonts/teachers/Teachers-Bold.ttf
        - asset: assets/fonts/teachers/Teachers-Medium.ttf
        - asset: assets/fonts/teachers/Teachers-SemiBold.ttf
  uses-material-design: true
